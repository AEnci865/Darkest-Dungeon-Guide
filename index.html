<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darkest Dungeon Campaign Optimizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Darkest Dungeon Campaign Optimizer</h1>

<div id="mainNav">
  <button data-tab="roster" class="nav-tab active">Roster</button>
  <button data-tab="team" class="nav-tab">Team Builder</button>
  <button data-tab="campaign" class="nav-tab">Campaign</button>
</div>

<!-- ROSTER -->
<div id="tab-roster" class="tab-pane active">
  <button onclick="loadSampleRoster()">Load Sample Roster</button>
  <button onclick="predictRunRisk()">Predict Risk</button>
  <button onclick="detectStressSpiral()">Stress Check</button>
  <div id="rosterGrid"></div>
</div>

<!-- TEAM -->
<div id="tab-team" class="tab-pane">
  <button onclick="buildAutoTeam()">Build Best Team</button>
  <div id="team-output"></div>
</div>

<!-- CAMPAIGN -->
<div id="tab-campaign" class="tab-pane">
  Week: <input id="weekInput" value="1">
  <button onclick="optimizeCampaign()">Optimize Next Move</button>
  <div id="campaign-output"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
