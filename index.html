<!DOCTYPE html>
<html lang="en">
<head>

<title>Darkest Dungeon: Estate Master Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --bg: #0a0505;
  --panel: #120d0d;
  --panel2: #1a1414;
  --gold: #d4b17a;
  --gold-dim: #8f6f3f;
  --gold-bright: #f0d090;
  --border: #3f2a1a;
  --border2: #2f211f;
  --text: #c8b89a;
  --text-dim: #7f6a4f;
  --red: #b82222;
  --red-dim: #6b1515;
  --bleed: #a02040;
  --blight: #4a6f1f;
  --holy: #c8a520;
  --eldritch: #5f3a9f;
  --stress: #7f4a9f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(120,40,20,0.15) 0%, transparent 70%),
    radial-gradient(ellipse at 80% 90%, rgba(80,20,30,0.18) 0%, transparent 70%);
}

.app { max-width: 1280px; margin: 0 auto; padding: 20px; }

/* Mode-specific adjustments */
body.mobile-friendly {
  font-size: 17px;
}
body.mobile-friendly .nav-tab,
body.mobile-friendly .ctrl-btn,
body.mobile-friendly .swap-btn,
body.mobile-friendly .pip {
  min-height: 48px; /* better touch targets */
  padding: 12px 10px;
}
body.mobile-friendly .team-grid {
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
}
body.mobile-friendly .hero-card,
body.mobile-friendly .building-card {
  padding: 18px;
}

  margin-bottom: 30px;
  position: relative;
}
