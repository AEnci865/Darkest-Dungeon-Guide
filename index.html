<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Darkest Dungeon Master Reference</title>
    <style>
        :root {
            --bg: #050505; --panel: #121212; --gold: #c5a059; --border: #4a3b21;
            --text: #bbb; --heal: #2d4d2d; --dmg: #7a1f1f; --util: #4b2d5c;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; background: var(--panel); border: 2px solid var(--border); padding: 15px; box-shadow: 0 0 50px #000; }
        h1, h2 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* Navigation Grid matching your image */
        .nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        @media(min-width: 600px) { .nav-grid { grid-template-columns: repeat(4, 1fr); } }

        button { background: #1a1a1a; border: 1px solid var(--border); color: var(--text); padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        button:hover { background: var(--gold); color: #000; }
        button.active { background: var(--gold); color: #000; font-weight: bold; }

        .content-box { border: 1px solid #333; padding: 15px; background: #0a0a0a; min-height: 400px; }
        
        /* Estate Tracker Layout */
        .estate-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
        @media(min-width: 700px) { .estate-grid { grid-template-columns: 1fr 1fr; } }
        .building-card { border: 1px solid var(--border); padding: 10px; background: #151515; }
        .building-card h3 { color: var(--gold); margin: 0 0 10px 0; font-size: 0.9rem; border-bottom: 1px solid #333; }
        .level-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        input[type="checkbox"] { transform: scale(1.2); accent-color: var(--gold); cursor: pointer; }

        /* Hero Slots */
        .team-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media(min-width: 600px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }
        .hero-slot { background: #1a1a1a; border: 1px solid #333; padding: 10px; }
        .hero-name { color: var(--gold); font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 5px; text-align: center; }
        .skills-text { font-size: 0.75rem; color: #999; line-height: 1.4; }
        .swap-btn { width: 100%; margin-top: 10px; background: #333; border: 1px solid #444; color: white; padding: 4px; font-size: 0.65rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Estate Master System</h1>
    
    <div class="nav-grid">
        <button onclick="ui('ruins')" class="t-btn active">💀 Ruins</button>
        <button onclick="ui('weald')" class="t-btn">🌿 Weald</button>
        <button onclick="ui('warrens')" class="t-btn">🐀 Warrens</button>
        <button onclick="ui('cove')" class="t-btn">🐙 Cove</button>
        <button onclick="ui('estate')" class="t-btn">🏰 Estate Tracker</button>
        <button onclick="ui('bosses')" class="t-btn">⚔️ Bosses</button>
        <button onclick="ui('farmstead')" class="t-btn">🌾 Farmstead</button>
        <button onclick="ui('provisions')" class="t-btn">🎒 Provisions</button>
    </div>

    <div id="main-view" class="content-box">
        </div>
</div>

<script>
    const heroes = {
        ruins: [
            { m: "Vestal", ms: "Judgment, Dazzling, Grace, Comfort", s: "Occultist", ss: "Wyrd, Curse, Artillery, Hex" },
            { m: "Plague Doctor", ms: "Noxious, Grenade, Gas, Meds", s: "Jester", ss: "Ballad, Tune, Slice, Dirk" },
            { m: "Highwayman", ms: "Duelist, PBS, Pistol, Open Vein", s: "Houndmaster", ss: "Rush, Whistle, Blackjack, Lick" },
            { m: "Crusader", ms: "Smite, Stun, Lance, Cry", s: "Leper", ss: "Chop, Hew, Purge, Withstand" }
        ]
        // Add more regions here
    };

    let subActive = [false, false, false, false];

    function ui(tab) {
        // Handle Active Button State
        document.querySelectorAll('.t-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
        const view = document.getElementById('main-view');

        if (tab === 'estate') {
            renderEstate(view);
        } else if (tab === 'ruins') {
            renderTeam(view, 'ruins');
        } else {
            view.innerHTML = `<h2>${tab.toUpperCase()}</h2><p style="text-align:center">Section under construction. Pass to Claude for GUI polishing.</p>`;
        }
    }

    function renderTeam(container, region) {
        let html = `<div class="team-grid">`;
        heroes[region].forEach((h, i) => {
            const isSub = subActive[i];
            html += `
                <div class="hero-slot">
                    <div class="hero-name">${isSub ? h.s : h.m}</div>
                    <div class="skills-text"><strong>Skills:</strong><br>${isSub ? h.ss : h.ms}</div>
                    <button class="swap-btn" onclick="swap(${i}, '${region}')">Swap Sub</button>
                </div>`;
        });
        container.innerHTML = html + `</div>`;
    }

    function swap(idx, region) {
        subActive[idx] = !subActive[idx];
        ui(region);
    }

    function renderEstate(container) {
        const builds = [
            { id: 'bs_w', n: 'Blacksmith: Weapons' },
            { id: 'bs_a', n: 'Blacksmith: Armor' },
            { id: 'guild', n: 'Guild: Skills' },
            { id: 'san', n: 'Sanitarium: Slots' }
        ];
        
        let html = `<h2>Estate Upgrades</h2><div class="estate-grid">`;
        builds.forEach(b => {
            html += `<div class="building-card"><h3>${b.n}</h3>`;
            for(let i=1; i<=5; i++) {
                const key = `${b.id}_${i}`;
                const checked = localStorage.getItem(key) === 'true' ? 'checked' : '';
                html += `
                    <div class="level-row">
                        Level ${i}
                        <input type="checkbox" id="${key}" ${checked} onchange="save('${key}')">
                    </div>`;
            }
            html += `</div>`;
        });
        container.innerHTML = html + `</div>`;
    }

    function save(id) {
        localStorage.setItem(id, document.getElementById(id).checked);
    }

    // Default view
    ui('ruins');
</script>

</body>
</html>
