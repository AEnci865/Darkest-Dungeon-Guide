:root {
--bg: #060404;
--panel: #0d0b0b;

--positive: #406030;

--scrollbar: #3a2c18;

* { box-sizing: border-box; margin: 0; padding: 0; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

body {
background: var(--bg);
color: var(--text);
font-family: ‘Crimson Pro’, Georgia, serif;
font-size: 15px;
min-height: 100vh;
background-image:
radial-gradient(ellipse at 20% 0%, rgba(100,50,10,0.12) 0%, transparent 60%),
radial-gradient(ellipse at 80% 100%, rgba(60,10,10,0.15) 0%, transparent 60%);
}

.app { max-width: 1200px; margin: 0 auto; padding: 20px; }

header { text-align: center; padding: 30px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; position: relative; }
header::before, header::after { content: ‘✦’; color: var(--gold-dim); font-size: 1.2rem; position: absolute; top: 50%; transform: translateY(-50%); }
header::before { left: 0; }
header::after { right: 0; }

h1 { font-family: ‘Cinzel Decorative’, serif; font-size: clamp(1.2rem, 3vw, 2rem); color: var(--gold); text-shadow: 0 0 40px rgba(197,160,89,0.4); letter-spacing: 6px; text-transform: uppercase; }
.subtitle { font-style: italic; color: var(--text-dim); font-size: 0.9rem; margin-top: 6px; letter-spacing: 2px; }
