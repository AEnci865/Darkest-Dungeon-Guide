<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkest Dungeon: Estate Reference</title>
    <style>
        :root {
            --bg: #0b0b0b; --panel: #1a1a1a; --gold: #c5a059; --border: #5c4b2b;
            --text: #d1d1d1; --red: #7a1f1f;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; border: 2px solid var(--border); background: var(--panel); padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        h1, h2 { text-align: center; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        /* The Navigation Grid - Matching your Layout Image */
        .nav-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .nav-btn { background: #252525; border: 1px solid var(--border); color: var(--text); padding: 12px 20px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; text-transform: uppercase; min-width: 140px; }
        .nav-btn:hover { background: var(--gold); color: black; }
        .nav-btn.active { background: var(--gold); color: black; font-weight: bold; }

        /* Content Area */
        .content-view { border: 1px solid #333; padding: 20px; background: #0a0a0a; min-height: 400px; }

        /* Team Builder Grid */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .hero-card { background: #151515; border: 1px solid #444; padding: 15px; text-align: center; }
        .hero-name { color: var(--gold); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .skills-list { font-size: 0.8rem; color: #999; text-align: left; line-height: 1.5; min-height: 80px; }
        .swap-btn { width: 100%; margin-top: 15px; padding: 8px; background: #333; color: white; border: 1px solid #555; cursor: pointer; font-size: 0.7rem; }

        /* Estate Tracker Styling */
        .estate-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .building-card { background: #111; border: 1px solid var(--border); padding: 15px; }
        .building-card h3 { color: var(--gold); margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; }
        .lvl-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        input[type="checkbox"] { transform: scale(1.3); accent-color: var(--gold); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Estate Management System</h1>
    
    <div class="nav-grid">
        <button class="nav-btn active" onclick="show('ruins')">💀 Ruins</button>
        <button class="nav-btn" onclick="show('weald')">🌿 Weald</button>
        <button class="nav-btn" onclick="show('warrens')">🐀 Warrens</button>
        <button class="nav-btn" onclick="show('cove')">🐙 Cove</button>
        <button class="nav-btn" onclick="show('estate')">🏰 Estate Tracker</button>
        <button class="nav-btn" onclick="show('bosses')">⚔️ Bosses</button>
        <button class="nav-btn" onclick="show('darkest')" style="color:red">🔥 Darkest Dungeon</button>
        <button class="nav-btn" onclick="show('provisions')">🎒 Provisions</button>
    </div>

    <div id="view" class="content-view">
        </div>
</div>

<script>
    // Data for Hero Positions & Subs
    const teamData = {
        ruins: [
            { pos: 4, m: "Vestal", ms: "Judgment, Dazzling, Grace, Comfort", s: "Occultist", ss: "Wyrd, Curse, Artillery, Hex" },
            { pos: 3, m: "Plague Doctor", ms: "Noxious, Grenade, Gas, Meds", s: "Jester", ss: "Ballad, Tune, Slice, Dirk" },
            { pos: 2, m: "Highwayman", ms: "Duelist, PBS, Pistol, Open Vein", s: "Houndmaster", ss: "Rush, Whistle, Blackjack, Lick" },
            { pos: 1, m: "Crusader", ms: "Smite, Stun, Lance, Cry", s: "Leper", ss: "Chop, Hew, Purge, Withstand" }
        ],
        weald: [
            { pos: 4, m: "Arbalest", ms: "Sniper, Flare, Bandage, Bola", s: "Vestal", ss: "Grace, Comfort, Dazzling, Judgment" },
            { pos: 3, m: "Houndmaster", ms: "Rush, Whistle, Guard, Lick", s: "Occultist", ss: "Wyrd, Curse, Pull, Hex" },
            { pos: 2, m: "Bounty Hunter", ms: "Collect, Mark, Flashbang, Finish", s: "Abomination", ss: "Manacles, Beast, Bile, Absolve" },
            { pos: 1, m: "Hellion", ms: "Wicked, Iron Swan, Bleed, YAWP", s: "Flagellant", ss: "Punish, Rain, Redeem, Reclaim" }
        ]
    };

    let subStates = [false, false, false, false];

    function show(tab) {
        // Update button colors
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tab));
        });

        const view = document.getElementById('view');

        if (tab === 'estate') {
            renderEstate(view);
        } else if (teamData[tab]) {
            renderTeam(view, tab);
        } else {
            view.innerHTML = `<h2>${tab}</h2><p style="text-align:center">Data processing in progress...</p>`;
        }
    }

    function renderTeam(container, region) {
        let html = `<div class="team-grid">`;
        teamData[region].forEach((hero, i) => {
            const activeSub = subStates[i];
            html += `
                <div class="hero-card">
                    <div class="hero-name">${activeSub ? hero.s : hero.m}</div>
                    <div class="skills-list"><strong>Skills:</strong><br>${activeSub ? hero.ss : hero.ms}</div>
                    <button class="swap-btn" onclick="swap(${i}, '${region}')">SWAP SUB</button>
                </div>`;
        });
        container.innerHTML = html + `</div>`;
    }

    function swap(idx, region) {
        subStates[idx] = !subStates[idx];
        show(region);
    }

    function renderEstate(container) {
        const buildings = [
            { id: 'bw', name: 'Blacksmith: Weapons' },
            { id: 'ba', name: 'Blacksmith: Armor' },
            { id: 'gd', name: 'Guild: Skills' },
            { id: 'sn', name: 'Sanitarium: Slots' }
        ];

        let html = `<h2>Hamlet Upgrade Tracker</h2><div class="estate-grid">`;
        buildings.forEach(b => {
            html += `<div class="building-card"><h3>${b.name}</h3>`;
            for (let i = 1; i <= 5; i++) {
                const key = `${b.id}_${i}`;
                const checked = localStorage.getItem(key) === 'true' ? 'checked' : '';
                html += `
                    <div class="lvl-row">
                        Level ${i}
                        <input type="checkbox" id="${key}" ${checked} onchange="save('${key}')">
                    </div>`;
            }
            html += `</div>`;
        });
        container.innerHTML = html + `</div>`;
    }

    function save(id) {
        const val = document.getElementById(id).checked;
        localStorage.setItem(id, val);
    }

    // Default to Ruins on load
    show('ruins');
</script>

</body>
</html>
