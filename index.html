<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darkest Dungeon: Estate Master Guide</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

    :root {
      --bg: #060404;
      --panel: #0d0b0b;
      --gold: #c5a059;
      --gold-dim: #8a6d38;
      --border: #3a2c18;
      --text: #c0b090;
      --text-dim: #7a6a50;
      --red: #cc2222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif; /* Fixed Quotes */
      line-height: 1.6;
      padding: 20px;
    }

    .app { max-width: 1200px; margin: 0 auto; }

    header { 
      text-align: center; 
      padding: 40px 0; 
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    /* Fixed Quotes in Pseudo-elements */
    header::before { content: '✦'; color: var(--gold-dim); position: absolute; left: 10px; top: 45px; }
    header::after { content: '✦'; color: var(--gold-dim); position: absolute; right: 10px; top: 45px; }

    h1 { 
      font-family: 'Cinzel Decorative', serif; 
      color: var(--gold); 
      text-transform: uppercase; 
      letter-spacing: 4px;
    }

    .container { margin-top: 30px; display: grid; gap: 20px; }
    .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
    .item-list { list-style: none; margin-top: 10px; }
    .priority-high { color: var(--gold-bright); border-left: 3px solid var(--gold); padding-left: 10px; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1>Estate Master Guide</h1>
    <p class="subtitle">"Ruin has come to our family..."</p>
  </header>

  <div id="main-content" class="container">
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA STRUCUTRE
// ═══════════════════════════════════════════════════════

const PROVISIONS = {
  short: {
    ruins: [
      { item: "Food", qty: 8 },
      { item: "Shovel", qty: 1 },
      { item: "Torch", qty: 8 },
      { item: "Holy Water", qty: 2 }
    ],
    weald: [
      { item: "Food", qty: 12 },
      { item: "Shovel", qty: 2 },
      { item: "Antivenom", qty: 2 },
      { item: "Bandage", qty: 2 }
    ]
  }
};

const BUILDINGS = [
  { 
    id: 'stagecoach', 
    name: 'Stage Coach', 
    priority: "CRITICAL",
    upgrades: ["Network", "Barracks", "Recruits"] 
  },
  { 
    id: 'blacksmith', 
    name: 'Blacksmith', 
    priority: "HIGH",
    upgrades: ["Weapons", "Armor", "Furnace"] 
  }
];

// ═══════════════════════════════════════════════════════
// LOGIC / RENDERING
// ═══════════════════════════════════════════════════════

function renderDashboard() {
  const container = document.getElementById('main-content');
  
  // Render Provisions Section
  let html = `
    <div class="card">
      <h2 style="color:var(--gold)">Provisions: Ruins (Short)</h2>
      <ul class="item-list">
        ${PROVISIONS.short.ruins.map(p => `<li><strong>${p.qty}x</strong> ${p.item}</li>`).join('')}
      </ul>
    </div>
  `;

  // Render Buildings Section
  html += `
    <div class="card">
      <h2 style="color:var(--gold)">Priority Upgrades</h2>
      <div class="item-list">
        ${BUILDINGS.map(b => `
          <div style="margin-bottom:15px">
            <h3 class="priority-high">${b.name} (${b.priority})</h3>
            <p style="font-size:0.9rem; color:var(--text-dim)">Focus: ${b.upgrades.join(', ')}</p>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  container.innerHTML = html;
}

// Initial Run
document.addEventListener('DOMContentLoaded', renderDashboard);

</script>
</body>
</html>
